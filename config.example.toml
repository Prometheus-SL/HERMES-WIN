# HERMES Agent Configuration
# Copy this file to config.toml and edit the values below

[connection]
# WebSocket server URL - Replace with your actual server
url = "wss://your-server.example.com/agent"

# Connection timeout settings
connect_timeout_seconds = 10
heartbeat_interval_seconds = 30

[agent]
# Unique identifier for this agent - Change this to something unique
name = "Windows-PC-001"

# System information to include in reports
include_system_info = true

[authentication]
# JWT authentication settings
# Leave empty if your server doesn't require authentication
jwt_secret = ""
jwt_issuer = ""

[commands]
# List of allowed commands that the agent can execute
# Only these commands will be executed for security
allowed_commands = [
    "volume",           # Volume control (up, down, mute, unmute)
    "open_app",         # Open applications (notepad, calc, etc.)
    "lock_screen",      # Lock the workstation
    "sleep",           # Put computer to sleep
    "system_info"      # Get system information
]

# Maximum execution time for commands (seconds)
command_timeout_seconds = 30

[logging]
# Log level: error, warn, info, debug, trace
level = "info"

# Log to file
log_to_file = true
log_file_path = "agent.log"

# Log rotation
max_log_size_mb = 10
max_log_files = 5

[security]
# Enable command whitelisting (strongly recommended)
enable_command_whitelist = true

# Enable audit logging
enable_audit_log = true

# Enable TLS certificate verification
verify_ssl_certificates = true

[system_monitoring]
# Enable system monitoring features
enabled = true

# Monitoring intervals (seconds)
cpu_monitor_interval = 5
memory_monitor_interval = 10
disk_monitor_interval = 30

# Performance monitoring thresholds
cpu_warning_threshold = 80.0
memory_warning_threshold = 85.0
disk_warning_threshold = 90.0