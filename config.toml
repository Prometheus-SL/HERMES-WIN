# HERMES Windows Agent Configuration
[connection]
# WebSocket server URL
url = "ws://localhost:3000/"
# Connection timeout in seconds
timeout = 30
# Reconnection interval in seconds
reconnect_interval = 5

[agent]
# Agent identification
name = "HERMES-WIN-Agent"
# CPU monitoring interval in seconds
cpu_interval = 5
# Enable system tray
enable_tray = true

[security]
# Enable TLS certificate verification
verify_tls = true
# Path to custom CA certificate (optional)
# ca_cert_path = "path/to/ca.pem"
# Client certificate for mutual TLS (optional)
# client_cert_path = "path/to/client.pem"
# Client private key for mutual TLS (optional)
# client_key_path = "path/to/client.key"

[commands]
# Whitelist of allowed commands
allowed_commands = ["volume", "open_app"]
# Enable volume control
allow_volume_control = true
# Enable application launching  º
allow_app_launch = true
# Allowed applications to launch (empty = all)
allowed_apps = []

[logging]
# Log level: trace, debug, info, warn, error
level = "info"
# Log to file
log_to_file = true
# Log file path
log_file = "agent.log"