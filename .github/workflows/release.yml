name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    steps:
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

  build-and-release:
    name: Build and Release
    needs: create-release
    strategy:
      matrix:
        os: 
          - windows-latest
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: hermes-agent-windows-x64
            asset_name: hermes-agent-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout sources
      uses: actions/checkout@v4

    - name: Install stable toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Create release package
      shell: bash
      run: |
        mkdir release
        cp target/${{ matrix.target }}/release/agent-service.exe release/
        cp target/${{ matrix.target }}/release/agent-tray.exe release/
        cp config.toml release/
        cp README.md release/
        cp LICENSE release/
        
        # Create installation script
        cat > release/install.bat << 'EOF'
        @echo off
        echo Installing HERMES Agent...
        agent-service.exe install
        echo Service installed. Starting service...
        net start HermesAgent
        echo HERMES Agent installed and started successfully!
        pause
        EOF
        
        # Create uninstall script
        cat > release/uninstall.bat << 'EOF'
        @echo off
        echo Stopping HERMES Agent...
        net stop HermesAgent
        echo Uninstalling HERMES Agent...
        agent-service.exe uninstall
        echo HERMES Agent uninstalled successfully!
        pause
        EOF

    - name: Archive release
      shell: bash
      run: |
        if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
          7z a ${{ matrix.asset_name }} ./release/*
        else
          tar -czf ${{ matrix.asset_name }} -C release .
        fi

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./${{ matrix.asset_name }}
        asset_name: ${{ matrix.asset_name }}
        asset_content_type: application/zip