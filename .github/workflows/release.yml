name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            label: Windows release
          - os: ubuntu-latest
            platform: linux
            label: Linux release
          - os: macos-latest
            platform: macos
            label: macOS release
    env:
      HERMES_ENABLE_NATIVE_AUDIO: "0"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci

      - name: Build release bundle
        run: npm run build:bundle

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.platform }}-release-artifacts
          if-no-files-found: error
          path: |
            release/HERMES-${{ matrix.platform }}-*
            release/SHA256SUMS-${{ matrix.platform }}.txt

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/HERMES-${{ matrix.platform }}-*
            release/SHA256SUMS-${{ matrix.platform }}.txt
