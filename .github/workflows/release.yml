name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-windows-release:
    name: Publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin
            ~\.cargo\registry\cache
            ~\.cargo\registry\index
            ~\.cargo\git\db
            src\native\win_volume\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/native/win_volume/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci

      - name: Build release artifacts
        run: npm run build

      - name: Build client delivery bundle
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-client-bundle.ps1

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-win-release-artifacts
          if-no-files-found: error
          path: |
            release\*.exe
            release\*.zip
            release\SHA256SUMS.txt

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/HERMES-WIN-Setup-*.exe
            release/HERMES-WIN-*.zip
            release/SHA256SUMS.txt
