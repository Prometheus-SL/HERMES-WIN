name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["development"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-client:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            label: Windows artifacts
          - os: ubuntu-latest
            platform: linux
            label: Linux artifacts
          - os: macos-latest
            platform: macos
            label: macOS artifacts
    env:
      HERMES_ENABLE_NATIVE_AUDIO: "0"
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --ci

      - name: Build release bundle
        run: npm run build:bundle

      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-${{ matrix.platform }}-client-artifacts
          if-no-files-found: error
          path: |
            release/HERMES-${{ matrix.platform }}-*
            release/SHA256SUMS-${{ matrix.platform }}.txt
