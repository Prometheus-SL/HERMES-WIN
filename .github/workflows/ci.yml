name: CI

on:
  pull_request:
    branches: ["main", "1-version"]
  push:
    branches: ["main", "1-version", "remove-rust-code"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-client:
    name: Build Windows client
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\bin
            ~\.cargo\registry\cache
            ~\.cargo\registry\index
            ~\.cargo\git\db
            src\native\win_volume\target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src/native/win_volume/Cargo.toml') }}

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run lint

      - name: Run tests
        run: npm test -- --ci

      - name: Build installer and zip
        run: npm run build

      - name: Build client bundle
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts/build-client-bundle.ps1

      - name: Upload client artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-win-client-artifacts
          if-no-files-found: error
          path: |
            release\*.exe
            release\*.zip
            release\SHA256SUMS.txt
