<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Media Bridge</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #08111f;
        color: #e5eef9;
      }
      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 32px 20px;
      }
      h1 {
        margin: 0 0 8px;
      }
      p {
        color: #a8bbd3;
      }
      form {
        display: grid;
        gap: 16px;
        margin-top: 24px;
        padding: 20px;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        background: rgba(15, 23, 42, 0.8);
      }
      label {
        display: grid;
        gap: 8px;
        font-weight: 600;
      }
      input {
        padding: 12px;
        border-radius: 12px;
        border: 1px solid rgba(148, 163, 184, 0.25);
        background: #0f172a;
        color: #e5eef9;
      }
      button {
        width: fit-content;
        padding: 12px 18px;
        border-radius: 999px;
        border: 0;
        background: #10b981;
        color: #04120f;
        font-weight: 700;
        cursor: pointer;
      }
      code {
        color: #d1fae5;
      }
      .status {
        margin-top: 12px;
        color: #86efac;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hermes Media Bridge</h1>
      <p>
        Paste the localhost bridge settings shown in the Hermes desktop console.
        The extension will forward YouTube, Twitch, and SoundCloud playback to Hermes.
      </p>

      <form id="settings-form">
        <label>
          Local bridge URL
          <input id="bridge-url" type="url" placeholder="http://127.0.0.1:47653" />
        </label>

        <label>
          Bearer token
          <input id="auth-token" type="text" placeholder="Paste the Hermes bridge token" />
        </label>

        <button type="submit">Save settings</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>
      </form>

      <p>
        Example values usually look like <code>http://127.0.0.1:47653</code> plus the long token
        shown in Hermes under <code>Now Playing bridge</code>.
      </p>
    </main>

    <script src="options.js"></script>
  </body>
</html>
